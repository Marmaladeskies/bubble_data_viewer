<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Data Manager</title>
    <style>
      body {
          font-family: system-ui, -apple-system, sans-serif;
          padding: 20px;
      }

      /* Table and Scroll Styles */
      #table-container {
          width: 100%;
          max-height: 65vh;
          /* Takes up 65% of the browser window height */
          overflow-y: auto;
          /* Enables vertical scrolling */
          overflow-x: auto;
          /* Enables horizontal scrolling */
          margin-top: 5px;
          border: 1px solid #ddd;
          border-radius: 4px;
      }

      table {
          width: 100%;
          border-collapse: collapse;
          margin-top: 7px;
          font-size: 14px;
          white-space: nowrap;
      }

      th,
      td {
          border: 1px solid #ddd;
          padding: 10px;
          text-align: left;
      }

      th {
          position: sticky;
          top: 0;
          z-index: 10;
          /* Keeps the header above the scrolling data rows */
          background-color: #e4f1ff;
          /* Critical: prevents text from bleeding through */
          font-weight: 600;
          text-transform: capitalize;
          cursor: pointer;
          user-select: none;
          transition: background-color 0.2s;
          /* Adds a crisp border-like shadow to the bottom of the sticky header */
          box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.2);
      }

      th:hover {
          background-color: #e2e6ea;
      }

      tbody tr:nth-child(even) {
          background-color: #ffffff;
      }

      tbody tr:nth-child(odd) {
          background-color: #f5f7f9;
      }

      tbody tr:hover {
          background-color: #eaecef;
      }

      /* Selected Row Styling */
      tbody tr.row-selected {
          background-color: #cce5ff !important;
      }

      tbody tr.row-selected:hover {
          background-color: #b8daff !important;
      }

      /* Checkbox Column */
      .select-cell {
          width: 26px;
          min-width: 16px !important;
          text-align: center;
          padding: 0px !important;
      }

      .select-cell input[type="checkbox"] {
          width: 16px;
          height: 16px;
          cursor: pointer;
          accent-color: #007bff;
      }

      .error {
          color: red;
          font-weight: bold;
          padding: 10px;
      }

      /* Layout Styles */
      .toolbar {
          background: #f4f6f8;
          padding: 15px;
          border-radius: 6px;
          margin-top: 20px;
          display: flex;
          flex-direction: column;
          gap: 15px;
      }

      .active-table-group {
          display: flex;
          align-items: center;
          gap: 15px;
          padding-bottom: 15px;
          border-bottom: 1px solid #ddd;
      }

      .search-group {
          display: flex;
          gap: 15px;
          flex-wrap: wrap;
          align-items: center;
      }

      #search-field {
          max-width: fit-content;
      }

      .search-bar {
          display: flex;
          gap: 8px;
          align-items: center;
      }

      .controls {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding-top: 10px;
          margin-top: 5px;
      }

      /* Inline Table Filter */
      .table-filter-container {
          margin-top: 20px;
          display: flex;
          align-items: flex-start;
          gap: 10px;
          flex-wrap: wrap;
      }

      .input-wrapper {
          position: relative;
          display: inline-flex;
          align-items: center;
      }

      .input-wrapper input[type="text"] {
          width: 100%;
          padding-right: 30px;
      }

      .input-clear-btn {
          position: absolute;
          right: 6px;
          background: transparent;
          border: none;
          color: #888;
          font-size: 18px;
          font-weight: bold;
          cursor: pointer;
          padding: 0 6px;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          line-height: 1;
          border-radius: 4px;
      }

      .input-clear-btn:hover {
          color: #222;
      }

      .filter-input {
          width: 100%;
          box-sizing: border-box;
          padding: 8px;
          padding-right: 30px;
          border: 1px solid #ccc;
          border-radius: 4px;
          font-size: 14px;
      }

      /* Form Controls */
      input,
      select {
          padding: 8px;
          border: 1px solid #ccc;
          border-radius: 4px;
          font-size: 14px;
          box-sizing: border-box;
      }

      select {
          appearance: none;
          -webkit-appearance: none;
          -moz-appearance: none;
          background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23444444' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
          background-repeat: no-repeat;
          background-position: right 12px center;
          padding-right: 34px;
          cursor: pointer;
      }

      select#data-type-selector {
          font-weight: 600;
          font-size: 15px;
          padding: 8px 36px 8px 12px;
          max-width: fit-content;
      }

      .btn {
          padding: 8px 16px;
          font-size: 14px;
          cursor: pointer;
          border: 1px solid #ccc;
          background: white;
          border-radius: 4px;
          font-weight: 500;
          max-width: 125px;
      }

      #edit-columns-link {
          color: #007bff;
          text-decoration: none;
          font-weight: 400;
          font-size: 14px;
          cursor: pointer;
          display: inline-flex;
          align-items: center;
          margin-top: 10px;
      }

      #edit-columns-link:hover {
          text-decoration: underline;
          color: #0056b3;
      }

      #column-edit-buttons {
          display: none;
          gap: 6px;
          margin-top: 10px;
      }

      #save-columns-btn,
      #cancel-columns-btn {
          padding: 6px 12px;
          font-weight: 500;
          max-width: 200px;
      }

      .edit-link {
          color: #007bff;
          text-decoration: none;
          font-weight: 400;
          font-size: 12px;
          cursor: pointer;
      }

      .edit-link:hover {
          text-decoration: underline;
          color: #0056b3;
      }

      .btn:disabled {
          cursor: not-allowed;
          opacity: 0.5;
      }

      .btn:hover:not(:disabled) {
          background: #e2e6ea;
      }

      .btn-danger {
          background: #dc3545;
          color: white;
          border-color: #dc3545;
      }

      .btn-danger:hover:not(:disabled) {
          background: #c82333;
      }

      /* New Row Styling */
      tbody tr.new-row-adding {
          background-color: #e6ffe6 !important;
      }

      tbody tr.new-row-adding:hover {
          background-color: #d0f5d0 !important;
      }

      tbody tr.new-row-adding td input {
          background: #fff;
          border: 1px solid #a3d9a5;
      }

      .btn-success {
          background: #28a745;
          color: white;
          border-color: #28a745;
      }

      .btn-success:hover:not(:disabled) {
          background: #218838;
      }

      #selection-buttons {
          justify-content: space-between;
      }

      .selection-bar {
          display: flex;
          align-items: center;
          gap: 22px;
          padding: 10px 15px;
          background: #f4f6f8;
          border: 1px solid #ddd;
          border-radius: 6px;
          margin-top: 10px;
          font-size: 14px;
          font-weight: 500;
          justify-content: space-between;
      }

      .selection-bar.active {
          background: #fff3cd;
          border: 1px solid #ffc107;
      }

      .selection-bar .btn {
          max-width: none;
          width: 140px;
      }

      .btn-primary {
          background: #007bff;
          color: white;
          border-color: #007bff;
      }

      .btn-primary:hover:not(:disabled) {
          background: #0056b3;
      }

      #page-info {
          font-weight: 500;
          font-size: 14px;
      }

      /* Sort Icon Styling */
      .sort-icon {
          font-size: 10px;
          margin-left: 5px;
          color: #666;
      }

      .badge {
          font-size: 12px;
          padding: 4px 8px;
          border-radius: 12px;
          background: #edd4d4;
          color: #571515;
          font-weight: 500;
      }

      /* Version Indicator Dropdown Badge */
      select#version-selector {
          font-size: 20px;
          padding: 4px 32px 4px 10px;
          border-radius: 12px;
          border: none;
          font-weight: 600;
          vertical-align: middle;
          margin-left: 10px;
          cursor: pointer;
          outline: none;
      }

      select#version-selector.badge-live {
          background-color: #d0ffcf;
          color: #047d00;
          background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23047d00' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      }

      select#version-selector.badge-test {
          background-color: #fff3cd;
          color: #856404;
          background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23856404' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      }

      /* Icon Button Styles */
      .icon-btn {
          background: transparent;
          border: 1px solid #ccc;
          cursor: pointer;
          padding: 9px;
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: 4px;
          transition: all 0.2s ease;
          color: #444;
          background-color: white;
          box-sizing: border-box;
          height: 36px;
          width: 36px;
      }

      .icon-btn:hover {
          background: #e2e6ea;
          color: #000;
      }

      .icon-btn:active {
          background: #d3d9df;
      }

      .icon-btn.btn-success {
          background-color: #28a745;
          border-color: #28a745;
          color: white;
      }

      .icon-btn.btn-success:hover {
          background-color: #218838;
          border-color: #218838;
          color: white;
      }

      .icon-btn.btn-success:active {
          background-color: #1e7e34;
          border-color: #1e7e34;
          color: white;
      }

      #add-row-btn {
          width: auto;
          gap: 6px;
          padding: 6px 12px;
      }

      #column-order-refresh-group {
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          gap: 6px;
      }

      .action-buttons {
          display: flex;
          gap: 10px;
      }

      /* Spin Animation for Refresh */
      .spin {
          animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
          100% {
              transform: rotate(360deg);
          }
      }

      @media (max-width: 925px) {
          #selection-bar {
              flex-direction: column;
              justify-self: left;
              justify-content: left !important;t;
          }
      }

      /* Cell Phone & Small Screen Responsive Layout */
      @media (max-width: 668px) {
          body {
              padding: 10px;
          }

          h1 {
              font-size: 22px;
              display: flex;
              flex-wrap: wrap;
              align-items: center;
              gap: 10px;
              margin-top: 10px;
          }

          select#version-selector {
              margin-left: 0;
              font-size: 16px;
          }

          .toolbar {
              padding: 12px;
              gap: 12px;
          }

          select#data-type-selector {
              flex: 1 1 100%;
          }

          .search-group {
              flex-direction: column;
              align-items: stretch;
              gap: 10px;
          }

          .search-bar {
              flex-wrap: wrap;
              gap: 8px;
          }

          .search-bar label {
              flex: 1 1 100%;
          }

          .search-bar select,
          .search-bar input[type="text"],
          .search-bar .input-wrapper,
          .search-bar button {
              flex: 1 1 100%;
              width: 100%;
          }

          .badge {
              display: block;
              line-height: 1.4;
              max-width: fit-content;
          }

          .controls {
              flex-wrap: wrap;
              gap: 12px;
              justify-content: space-between;
              text-align: center;
          }

          #page-info {
              flex: 1 1 100%;
              order: 1;
          }

          .controls button {
              flex: 1 1 calc(50% - 6px);
          }

          .selection-bar {
              flex-wrap: wrap;
          }

          #selection-count {
              flex: 1 1 100%;
          }

          .selection-bar button {
              flex: 1 1 calc(50% - 5px);
          }

          #column-order-refresh-group {
              display: flex;
              flex-direction: column;
              align-items: flex-end;
              width: 100%;
              gap: 8px;
          }

          .action-buttons {
              width: 100%;
          }

          .table-filter-container {
              flex-direction: column;
              align-items: stretch !important;
              gap: 12px;
          }

          .table-filter-container>div:first-child {
              width: 100%;
          }

          .filter-input,
          .table-filter-container .input-wrapper {
              width: 100% !important;
          }

          #edit-columns-link {
              font-size: 14px;
          }

          .icon-btn {
              width: 40px;
              height: 40px;
          }

          #table-container {
              max-height: 70vh;
          }

          th,
          td {
              padding: 8px 6px;
          }

          .edit-link {
              font-size: 13px;
              padding: 4px 2px;
              display: inline-block;
          }
      }
    </style>
  </head>

  <body>
    <h1>
      Bubble Data Manager
      <select
        id="version-selector"
        class="badge-test"
        onchange="handleVersionChange()"
      >
        <option value="/version-test">Test Version</option>
        <option value="">Live</option>
      </select>
    </h1>
    <div class="active-table-group">
      <label style="font-size: 15px; font-weight: 600">Active Table:</label>
      <select
        id="data-type-selector"
        onchange="handleDataTypeChange()"
      ></select>
    </div>
    <div class="toolbar">
      <div class="search-group">
        <div class="search-bar">
          <label style="font-size: 14px; font-weight: 500"
            >Search Bubble:</label
          >
          <select id="search-field"></select>
          <div class="input-wrapper" style="flex: 1; min-width: 200px">
            <input
              type="text"
              id="search-value"
              placeholder="Search (exact matches only)..."
              oninput="toggleClearBtn('search-value', 'clear-search-btn')"
              onkeydown="if (event.key === 'Enter') applyServerSearch();"
            />
            <button
              type="button"
              id="clear-search-btn"
              class="input-clear-btn"
              onclick="clearServerSearch()"
              title="Clear search"
              style="display: none"
            >
              ×
            </button>
          </div>
          <button
            class="btn btn-primary"
            onclick="applyServerSearch()"
            style="max-width: fit-content"
          >
            Search
          </button>
        </div>
        <span class="badge"
          >Bubble's search is limited to exact matches only.</span
        >
      </div>
    </div>
    <div class="table-filter-container" style="justify-content: space-between">
      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 4px;
          align-items: flex-start;
        "
      >
        <div class="input-wrapper" style="width: 400px; max-width: 400px">
          <input
            type="text"
            id="table-filter"
            class="filter-input"
            oninput="
              applyClientFilter();
              toggleClearBtn('table-filter', 'clear-filter-btn');
            "
            placeholder="Filter current view by keyword (all fields)..."
          />
          <button
            type="button"
            id="clear-filter-btn"
            class="input-clear-btn"
            onclick="clearClientFilter()"
            title="Clear filter"
            style="display: none"
          >
            ×
          </button>
        </div>
        <span style="font-size: 12px; color: #666"
          >Filters this page view only. Other matches may exist on the
          server.</span
        >
      </div>

      <div id="column-order-refresh-group">
        <a
          href="#"
          id="edit-columns-link"
          onclick="
            event.preventDefault();
            toggleColumnEditMode();
          "
          >Edit Column Order</a
        >
        <div id="column-edit-buttons">
          <button
            type="button"
            id="save-columns-btn"
            class="btn btn-primary"
            onclick="toggleColumnEditMode()"
          >
            Save Column Order
          </button>
          <button
            type="button"
            id="cancel-columns-btn"
            class="btn"
            onclick="cancelColumnEditMode()"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <div id="selection-bar" class="selection-bar">
      <div id="selection-buttons" class="selection-bar">
        <span id="selection-count">0 rows selected</span>
        <button
          id="edit-selected-btn"
          class="btn btn-primary"
          onclick="editSelectedRows()"
          disabled
        >
          Edit Selected
        </button>
        <button
          id="delete-selected-btn"
          class="btn btn-danger"
          onclick="deleteSelectedRows()"
          disabled
        >
          Delete Selected
        </button>
        <button
          id="clear-selection-btn"
          class="btn"
          onclick="clearSelection()"
          disabled
        >
          Clear Selection
        </button>
      </div>
      <div id="action-buttons" class="action-buttons">
        <button
          id="add-row-btn"
          class="icon-btn btn-success"
          onclick="addNewRow()"
          title="Add New Row"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add New Row
        </button>
        <button
          id="refresh-btn"
          class="icon-btn"
          onclick="triggerRefresh()"
          title="Refresh Table Data"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="controls">
      <button
        id="prev-btn"
        class="btn"
        onclick="prevPage()"
        disabled
        style="display: none"
      >
        Previous
      </button>
      <span id="page-info">Loading...</span>
      <button
        id="next-btn"
        class="btn"
        onclick="nextPage()"
        disabled
        style="display: none"
      >
        Next
      </button>
    </div>

    <div id="table-container"></div>

    <script>
      // --- CONFIGURATION ---
      let VERSION = ""; // Default database to load: test = '/version-test' ; live = ''
      const DOMAIN_NAME = "yourdomain.com";
      let API_BASE_URL = `https://${DOMAIN_NAME}${VERSION}/api/1.1/obj/`;
      const API_TOKEN = "<your_private_API_key>";
      const EXCLUDED_TYPES = []; // list any data types you want this script to always ignore entirely

      // Optional Configuration for storing persisent column order
      let originalHeadersRaw = [];
      const APP_SETTINGS_TYPE = "specialdataconstants"; // data type that stores custom column data (lowercase, remove spaces)
      const FIELD_NAME_PREFIX = "column order"; // arbitrary prefix all of the column sorting data field names in your database begin with

      // Build the full DATA_TYPES array with layout keys from a base list
      function buildDataTypes(baseTypes) {
        return baseTypes.map((dt) => {
          const final_suffix =
            dt.data_type_name_lowercase || dt.label.toLowerCase();
          return {
            value: dt.value,
            label: dt.label,
            layoutKey: `${FIELD_NAME_PREFIX} ${final_suffix}`,
          };
        });
      }

      let DATA_TYPES = [];

      // --- OPTION SET STATE ---
      // Maps option set slug (e.g. 'dropdown_options') to an array of string values
      let cachedOptionSets = {};
      // Maps data type slug -> field display name -> field meta object (id, display, type)
      let cachedFieldMeta = {};
      // Maps data type slug -> array of all column headers found in /api/1.1/meta
      let cachedTypeColumns = {};

      // Fetch available data types from Bubble's API meta endpoint
      async function fetchDataTypesFromBubble() {
        const metaUrl = `https://${DOMAIN_NAME}${VERSION}/api/1.1/meta`;
        const response = await fetch(metaUrl, {
          headers: { Authorization: `Bearer ${API_TOKEN}` },
        });
        if (!response.ok)
          throw new Error(`HTTP ${response.status} fetching API meta`);
        const meta = await response.json();

        const types = meta.types;
        if (!types || typeof types !== "object") {
          throw new Error("No types found in API meta response");
        }

        // Cache field metadata for each type so we can look up option-set fields during editing
        // The meta API returns field IDs but GET responses use display captions (use_captions_for_get)
        // So we build a lookup: dataTypeSlug -> displayName -> { id, display, type }
        cachedFieldMeta = {};
        cachedTypeColumns = {};
        Object.entries(types).forEach(([typeSlug, typeInfo]) => {
          const fieldMap = {};
          const cols = [];
          if (typeInfo.fields) {
            typeInfo.fields.forEach((field) => {
              if (field.display) fieldMap[field.display] = field;
              if (field.id) fieldMap[field.id] = field;
              const colName = field.display || field.id;
              if (colName && !cols.includes(colName)) {
                cols.push(colName);
              }
            });
          }
          cachedFieldMeta[typeSlug] = fieldMap;
          cachedTypeColumns[typeSlug] = cols;
        });

        // Build option slug -> display name mapping from get-options return_btype
        optionSlugToDisplayName = {};
        const getOptionsEndpoint =
          (meta.post || []).find((ep) => ep.endpoint === "get-options") ||
          (meta.get || []).find((ep) => ep.endpoint === "get-options");
        if (getOptionsEndpoint && getOptionsEndpoint.return_btype) {
          Object.entries(getOptionsEndpoint.return_btype).forEach(
            ([displayName, typeStr]) => {
              // typeStr is like 'list.option.dropdown_options'
              const match = typeStr.match(/^list\.option\.(.+)$/);
              if (match) {
                optionSlugToDisplayName[match[1]] = displayName;
              }
            },
          );
        }
        console.log(
          `Mapped ${Object.keys(optionSlugToDisplayName).length} option slug(s) to display names.`,
        );

        return Object.entries(types)
          .map(([value, info]) => ({ value, label: info.display }))
          .filter((dt) => !EXCLUDED_TYPES.includes(dt.value))
          .sort((a, b) => a.label.localeCompare(b.label));
      }

      // Fetch all option sets from the backend workflow API
      async function fetchOptionSets() {
        try {
          let url = `https://${DOMAIN_NAME}${VERSION}/api/1.1/wf/get-options`;
          let response = await fetch(url, {
            method: "GET",
            headers: {
              Authorization: `Bearer ${API_TOKEN}`,
            },
          });
          if (!response.ok && VERSION === "") {
            // Fallback to version-test if get-options is not deployed to live yet
            url = `https://${DOMAIN_NAME}/version-test/api/1.1/wf/get-options`;
            response = await fetch(url, {
              method: "GET",
              headers: {
                Authorization: `Bearer ${API_TOKEN}`,
              },
            });
          }
          if (!response.ok)
            throw new Error(`HTTP ${response.status} fetching option sets`);
          const data = await response.json();
          const resp = data.response || data;

          // Build a map from option slug -> array of values
          cachedOptionSets = {};
          Object.entries(resp).forEach(([displayName, values]) => {
            if (Array.isArray(values)) {
              cachedOptionSets[displayName] = values;
            }
          });

          console.log(
            `Loaded ${Object.keys(cachedOptionSets).length} option sets from Bubble.`,
          );
        } catch (err) {
          console.error("Failed to fetch option sets:", err);
        }
      }

      function getFieldMeta(dataTypeSlug, fieldDisplayName) {
        const typeMeta = cachedFieldMeta[dataTypeSlug];
        if (!typeMeta || !fieldDisplayName) return null;

        let fieldMeta = typeMeta[fieldDisplayName];
        if (!fieldMeta && typeof fieldDisplayName === "string") {
          const clean = fieldDisplayName.toLowerCase().trim();
          fieldMeta = Object.values(typeMeta).find(
            (f) =>
              (f.display && f.display.toLowerCase().trim() === clean) ||
              (f.id && f.id.toLowerCase().trim() === clean),
          );
        }
        return fieldMeta || null;
      }

      // Look up which option set values apply to a given field based on meta schema
      function getOptionSetForField(dataTypeSlug, fieldDisplayName) {
        const fieldMeta = getFieldMeta(dataTypeSlug, fieldDisplayName);
        if (!fieldMeta) return null;

        const fieldType = fieldMeta.type; // e.g. 'option.dropdown_options' or 'option.times'
        if (!fieldType || !fieldType.startsWith("option.")) return null;

        const optionSlug = fieldType.replace("option.", ""); // e.g. 'dropdown_options', 'times'

        for (const [displayName, values] of Object.entries(cachedOptionSets)) {
          if (optionSlugMatchesDisplayName(optionSlug, displayName)) {
            return values;
          }
        }
        return null;
      }

      // Detect if a column is typed as yes/no (boolean) in Bubble
      function isBooleanField(dataTypeSlug, fieldDisplayName) {
        const fieldMeta = getFieldMeta(dataTypeSlug, fieldDisplayName);
        if (fieldMeta) {
          return fieldMeta.type === "boolean";
        }

        // Fallback: check cachedRecords
        for (let record of cachedRecords) {
          if (
            record[fieldDisplayName] !== null &&
            record[fieldDisplayName] !== undefined
          ) {
            return typeof record[fieldDisplayName] === "boolean";
          }
        }
        return false;
      }

      // Resolve option slug to display name using the cached option set return types from meta
      let optionSlugToDisplayName = {};

      function optionSlugMatchesDisplayName(slug, displayName) {
        if (optionSlugToDisplayName[slug] === displayName) return true;
        if (slug.toLowerCase() === displayName.toLowerCase()) return true;
        if (slug.replace(/_/g, " ").toLowerCase() === displayName.toLowerCase())
          return true;
        return false;
      }

      // Rebuild DATA_TYPES and re-populate the selector dropdown
      function rebuildDataTypes(baseTypes, preferredValue = null) {
        DATA_TYPES = buildDataTypes(baseTypes);
        const selector = document.getElementById("data-type-selector");
        selector.innerHTML = "";
        DATA_TYPES.forEach((dt) => {
          const option = document.createElement("option");
          option.value = dt.value;
          option.text = dt.label;
          selector.appendChild(option);
        });
        if (
          preferredValue &&
          DATA_TYPES.some((dt) => dt.value === preferredValue)
        ) {
          selector.value = preferredValue;
        } else if (DATA_TYPES.length > 0) {
          selector.value = DATA_TYPES[0].value;
        }
      }

      // --- UTILITY ---
      function escapeHTML(str) {
        if (typeof str !== "string") return str;
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // --- GLOBAL STATE ---
      let currentCursor = 0;
      const LIMIT = 100;
      let currentConstraints = [];
      let fieldsPopulated = false;
      let cachedRecords = []; // Holds raw server results for local filtering
      let detectedHeaders = []; // Holds absolute unique columns
      let settingsRecord = null; // Holds your centralized backend database constants layout settings

      // --- COLUMN REORDERING STATE ---
      let isEditingColumns = false;
      let preEditHeadersBackup = [];

      // --- SORTING STATE ---
      let sortField = "Created Date";
      let sortDescending = true; // true = newest first, false = oldest first

      // --- SELECTION STATE ---
      let selectedRowIds = new Set();

      // --- INITIALIZATION ---
      async function initApp() {
        const fetchedTypes = await fetchDataTypesFromBubble();
        rebuildDataTypes(fetchedTypes);
        console.log(
          `Auto-loaded ${fetchedTypes.length} data types from Bubble.`,
        );

        // Fetch option sets and build the slug-to-display-name cross-reference
        await fetchOptionSets();

        // Sync the version selector UI with the configuration variable
        const versionSelector = document.getElementById("version-selector");
        versionSelector.value = VERSION;
        if (VERSION === "") {
          versionSelector.className = "badge-live";
        } else {
          versionSelector.className = "badge-test";
        }

        fetchAndRenderData();
      }

      // --- FETCH CENTRALIZED COLUMN ORDER SETTINGS ---
      async function fetchSettings() {
        try {
          // Fetch the single constants record
          const fetchUrl = `${API_BASE_URL}${APP_SETTINGS_TYPE}?limit=1`;
          const response = await fetch(fetchUrl, {
            headers: { Authorization: `Bearer ${API_TOKEN}` },
          });

          if (response.ok) {
            const data = await response.json();
            if (data.response.results && data.response.results.length > 0) {
              settingsRecord = data.response.results[0];
            }
          }
        } catch (err) {
          console.error("Failed to load backend data constants:", err);
        }
      }

      // --- DATA TYPE SWITCHING ---
      function handleDataTypeChange() {
        // 0. Reset Column Edit Mode
        isEditingColumns = false;
        const editLink = document.getElementById("edit-columns-link");
        if (editLink) editLink.style.display = "";
        const editButtons = document.getElementById("column-edit-buttons");
        if (editButtons) editButtons.style.display = "none";
        const saveBtn = document.getElementById("save-columns-btn");
        if (saveBtn) {
          saveBtn.innerText = "Save Column Order";
          saveBtn.disabled = false;
        }
        const cancelBtn = document.getElementById("cancel-columns-btn");
        if (cancelBtn) cancelBtn.disabled = false;

        // 1. Reset Pagination & Sorting
        currentCursor = 0;
        sortField = "Created Date";
        sortDescending = true;

        // 2. Reset Search Constraints
        currentConstraints = [];
        document.getElementById("search-value").value = "";
        document.getElementById("table-filter").value = "";
        toggleClearBtn("search-value", "clear-search-btn");
        toggleClearBtn("table-filter", "clear-filter-btn");

        // 3. Reset the Query Dropdown
        const searchFieldSelect = document.getElementById("search-field");
        searchFieldSelect.innerHTML = "";
        fieldsPopulated = false; // Forces the script to rescan the new data type's headers

        // 4. Clear Row Selections
        selectedRowIds.clear();
        updateSelectionBar();

        // Clear layout cache so it re-fetches for the new configuration
        settingsRecord = null;

        fetchAndRenderData();
      }

      // --- REFRESH ACTION ---
      async function triggerRefresh() {
        const refreshBtn = document.getElementById("refresh-btn");
        const svgIcon = refreshBtn.querySelector("svg");

        // Start spinning
        svgIcon.classList.add("spin");

        // Fetch the data (awaiting the completion)
        await fetchAndRenderData();

        // Stop spinning once data is loaded
        svgIcon.classList.remove("spin");
      }

      async function fetchAndRenderData() {
        const container = document.getElementById("table-container");
        const pageInfo = document.getElementById("page-info");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");

        container.innerHTML =
          '<div style="padding: 10px;">Fetching data...</div>';

        try {
          // Only fetch settings if not already cached
          if (!settingsRecord) {
            await fetchSettings();
          }

          // Set up headers for authentication
          const headersConfig = {};
          if (API_TOKEN) {
            headersConfig["Authorization"] = `Bearer ${API_TOKEN}`;
          }

          // Construct URL dynamically based on the selected data type
          const currentType =
            document.getElementById("data-type-selector").value;
          let fetchUrl = `${API_BASE_URL}${currentType}?cursor=${currentCursor}`;

          // Append Constraints
          if (currentConstraints.length > 0) {
            const constraintsJson = JSON.stringify(currentConstraints);
            // encodeURIComponent ensures special characters like brackets and quotes don't break the URL
            fetchUrl += `&constraints=${encodeURIComponent(constraintsJson)}`;
          }

          // Append sorting parameters
          if (sortField) {
            fetchUrl += `&sort_field=${encodeURIComponent(sortField)}&descending=${sortDescending}`;
          }

          const response = await fetch(fetchUrl, { headers: headersConfig });

          if (!response.ok) {
            throw new Error(
              `HTTP Error: ${response.status} ${response.statusText}`,
            );
          }

          const data = await response.json();
          cachedRecords = data.response.results || [];
          const remaining = data.response.remaining;
          const count = data.response.count;

          // Determine all structural columns across the batch from API meta
          const metaHeaders = cachedTypeColumns[currentType] || [];
          const allKeysSet = new Set(metaHeaders);
          cachedRecords.forEach((record) => {
            Object.keys(record).forEach((key) => allKeysSet.add(key));
          });
          detectedHeaders = Array.from(allKeysSet);

          // --- DATABASE-DRIVEN COLUMN REORDERING ---
          const currentTypeConfig = DATA_TYPES.find(
            (dt) => dt.value === currentType,
          );
          // Grab the correct API field key from our config
          const targetKey = currentTypeConfig
            ? currentTypeConfig.layoutKey
            : "";

          let activeOrderMap = null;

          // Look for the array inside the backend database constant settings record instead of cachedRecords
          if (settingsRecord && targetKey && settingsRecord[targetKey]) {
            const rawMap = settingsRecord[targetKey];
            if (Array.isArray(rawMap)) {
              activeOrderMap = rawMap;
            } else if (typeof rawMap === "string") {
              try {
                activeOrderMap = JSON.parse(rawMap);
              } catch (e) {}
            }
          }

          // String-based column matching
          if (activeOrderMap && activeOrderMap.length > 0) {
            let reorderedHeaders = [];

            activeOrderMap.forEach((headerName) => {
              if (detectedHeaders.includes(headerName)) {
                reorderedHeaders.push(headerName);
              }
            });

            // Append any new or unsaved columns to the end
            detectedHeaders.forEach((header) => {
              if (!reorderedHeaders.includes(header)) {
                reorderedHeaders.push(header);
              }
            });

            detectedHeaders = reorderedHeaders;
          }

          // Dynamically populate drop-down fields strictly once
          populateSearchFields(detectedHeaders);

          // Clear the local text input when turning pages/requerying, then render
          document.getElementById("table-filter").value = "";
          toggleClearBtn("table-filter", "clear-filter-btn");

          if (cachedRecords.length === 0) {
            renderTable([], detectedHeaders, container);
            container.innerHTML +=
              '<div style="padding: 10px; text-align: center; color: #666;">No records found matching your database query.</div>';
            pageInfo.innerText = "No records";
            nextBtn.disabled = true;
            prevBtn.disabled = currentCursor === 0;
            if (prevBtn.disabled && nextBtn.disabled) {
              prevBtn.style.display = "none";
              nextBtn.style.display = "none";
            } else {
              prevBtn.style.display = "";
              nextBtn.style.display = "";
            }
            return;
          }

          renderTable(cachedRecords, detectedHeaders, container);

          const startRecord = currentCursor + 1;
          const endRecord = currentCursor + count;
          pageInfo.innerText = `Showing ${startRecord} - ${endRecord} (${remaining} remaining)`;

          // Toggle button states
          prevBtn.disabled = currentCursor === 0;
          nextBtn.disabled = remaining === 0;

          if (prevBtn.disabled && nextBtn.disabled) {
            prevBtn.style.display = "none";
            nextBtn.style.display = "none";
          } else {
            prevBtn.style.display = "";
            nextBtn.style.display = "";
          }
        } catch (error) {
          console.error("Fetch error:", error);
          container.innerHTML = `<div class="error">Failed to load data: ${error.message}</div>`;
          pageInfo.innerText = "Error";
        }
      }

      function populateSearchFields(headers) {
        if (fieldsPopulated) return;
        const select = document.getElementById("search-field");
        select.innerHTML = "";

        // Set "All Fields" as the default combined search option
        const allOption = document.createElement("option");
        allOption.value = "any_field";
        allOption.text = "All Fields";
        select.appendChild(allOption);

        headers.forEach((header) => {
          const option = document.createElement("option");
          option.value = header;
          option.text = header.replace(/_/g, " ").trim();
          option.style.textTransform = "capitalize";
          select.appendChild(option);
        });

        select.value = "any_field"; // Default to search all fields
        fieldsPopulated = true;
      }

      function renderTable(records, headers, container) {
        // Extract column headers dynamically from the first record's keys
        let tableHTML = "<table><thead><tr>";

        // Add Select-All Checkbox Header
        const allChecked =
          records.length > 0 && records.every((r) => selectedRowIds.has(r._id));
        tableHTML += `<th class="select-cell">
                            <input type="checkbox" title="Select all rows" ${allChecked ? "checked" : ""}
                                   onchange="toggleSelectAll(this.checked)">
                          </th>`;

        // Generate Data Headers (Conditionally Draggable)
        headers.forEach((header, index) => {
          const cleanHeader = header.replace(/_/g, " ").trim();
          let sortIcon = "";
          if (sortField === header) {
            sortIcon = sortDescending
              ? '<span class="sort-icon">▼</span>'
              : '<span class="sort-icon">▲</span>';
          }

          // Determine behaviors based on mode
          const draggableAttr = isEditingColumns ? 'draggable="true"' : "";
          const cursorStyle = isEditingColumns
            ? "cursor: grab;"
            : "cursor: pointer;";
          const dragEvents = isEditingColumns
            ? `ondragstart="handleDragStart(event, ${index})" ondragover="handleDragOver(event)" ondrop="handleDrop(event, ${index})"`
            : "";
          const clickEvent = isEditingColumns
            ? ""
            : `onclick="handleSort('${header}')"`; // Disable sorting while dragging
          const titleText = isEditingColumns
            ? "Drag to reorder column"
            : `Sort by ${cleanHeader}`;

          tableHTML += `<th
                                ${draggableAttr}
                                ${dragEvents}
                                ${clickEvent}
                                style="${cursorStyle}"
                                title="${titleText}">
                                ${cleanHeader} ${sortIcon}
                              </th>`;
        });

        tableHTML += "</tr></thead><tbody>";

        // Generate Data Rows
        records.forEach((record) => {
          const isSelected = selectedRowIds.has(record._id);
          // Attach the _id to the tr element so we can target the whole row
          tableHTML += `<tr id="row-${record._id}" class="${isSelected ? "row-selected" : ""}">`;

          // Add Row Checkbox cell
          tableHTML += `<td class="select-cell">
                                <input type="checkbox" ${isSelected ? "checked" : ""}
                                       onchange="toggleRowSelection('${record._id}', this.checked)">
                              </td>`;

          // Add the explicit Edit Button cell
          tableHTML += `<td class="action-cell"></td>`;

          headers.forEach((header) => {
            let cellValue = record[header];

            // Convert boolean true/false to yes/no
            const currentType =
              document.getElementById("data-type-selector")?.value || "";
            if (
              typeof cellValue === "boolean" ||
              (isBooleanField(currentType, header) &&
                (cellValue === "true" || cellValue === "false"))
            ) {
              cellValue =
                cellValue === true || cellValue === "true" ? "yes" : "no";
            }
            // Handle missing values cleanly
            else if (cellValue === null || cellValue === undefined) {
              cellValue = "";
            }
            // Bubble often returns linked data or geographic addresses as objects/arrays
            else if (typeof cellValue === "object") {
              cellValue = JSON.stringify(cellValue);
            }

            // Escape output to prevent XSS
            const safeValue = escapeHTML(cellValue);

            // Assign data-field so we can map inputs back to Bubble's database schema
            tableHTML += `<td data-field="${header}">${safeValue}</td>`;
          });
          tableHTML += "</tr>";
        });

        tableHTML += "</tbody></table>";

        // Inject the completed table into the DOM
        container.innerHTML = tableHTML;
      }

      // --- CLIENT SIDE INLINE TABLE FILTER ---
      function applyClientFilter() {
        const filterValue = document
          .getElementById("table-filter")
          .value.trim()
          .toLowerCase();
        const container = document.getElementById("table-container");

        if (!filterValue) {
          // If text input is blank, return to unfiltered cached server rows
          renderTable(cachedRecords, detectedHeaders, container);
          return;
        }

        const filteredRecords = cachedRecords.filter((record) => {
          return Object.values(record).some((val) => {
            if (val === null || val === undefined) return false;
            const stringVal =
              typeof val === "object" ? JSON.stringify(val) : String(val);
            return stringVal.toLowerCase().includes(filterValue);
          });
        });

        if (filteredRecords.length === 0) {
          renderTable([], detectedHeaders, container);
          container.innerHTML += `<div style="padding: 10px; text-align: center; color: #666;">No visible records match "${filterValue}" on this page.</div>`;
        } else {
          renderTable(filteredRecords, detectedHeaders, container);
        }
      }

      // --- SERVER SIDE SEARCH ACTIONS ---
      function applyServerSearch() {
        const field = document.getElementById("search-field").value;
        const value = document.getElementById("search-value").value;

        if (!field) {
          alert("Please pick a target database field to execute a query.");
          return;
        }
        if (!value.trim()) {
          clearServerSearch();
          return;
        }

        // Construct the Bubble API constraint object
        currentConstraints = [
          {
            key: field === "any_field" ? "any field" : field,
            constraint_type: "text contains",
            value: value.trim(),
          },
        ];

        // Reset to the first page of results
        currentCursor = 0;
        fetchAndRenderData();
      }

      function clearServerSearch() {
        document.getElementById("search-value").value = "";
        document.getElementById("search-field").value = "any_field"; // Reset to default
        toggleClearBtn("search-value", "clear-search-btn");
        if (currentConstraints.length > 0) {
          currentConstraints = [];
          currentCursor = 0;
          fetchAndRenderData();
        }
      }

      function clearClientFilter() {
        document.getElementById("table-filter").value = "";
        toggleClearBtn("table-filter", "clear-filter-btn");
        applyClientFilter();
      }

      function toggleClearBtn(inputId, btnId) {
        const input = document.getElementById(inputId);
        const btn = document.getElementById(btnId);
        if (input && btn) {
          btn.style.display = input.value.length > 0 ? "flex" : "none";
        }
      }

      // --- SERVER SIDE SORTING ---
      function handleSort(field) {
        if (sortField === field) {
          sortDescending = !sortDescending;
        } else {
          sortField = field;
          sortDescending = false;
        }
        currentCursor = 0;
        fetchAndRenderData();
      }

      // --- PAGINATION ACTIONS ---
      function nextPage() {
        currentCursor += LIMIT;
        fetchAndRenderData();
      }

      function prevPage() {
        currentCursor = Math.max(0, currentCursor - LIMIT);
        fetchAndRenderData();
      }

      // --- CLIENT SIDE ROW EDITING ---
      function editSelectedRows() {
        selectedRowIds.forEach((recordId) => {
          const row = document.getElementById(`row-${recordId}`);
          if (row) {
            const actionCell = row.querySelector(".action-cell");
            if (actionCell && actionCell.innerHTML.trim() === "") {
              editRow(recordId);
            }
          }
        });
      }

      function editRow(recordId) {
        const row = document.getElementById(`row-${recordId}`);
        const cells = row.querySelectorAll("td[data-field]"); // Grab all data cells

        cells.forEach((cell) => {
          const field = cell.getAttribute("data-field");

          // Prevent editing of Bubble's protected system IDs
          if (
            field === "_id" ||
            field === "Created Date" ||
            field === "Created By" ||
            field === "Modified Date"
          )
            return;

          const currentValue = cell.innerText;
          cell.setAttribute("data-original", currentValue); // Store for cancellation

          // Check if this field uses an option set or yes/no type
          const currentType =
            document.getElementById("data-type-selector").value;
          const optionValues = getOptionSetForField(currentType, field);
          const isBool = isBooleanField(currentType, field);

          cell.innerHTML = "";

          if (isBool) {
            // Render a <select> dropdown for yes/no fields
            const select = document.createElement("select");
            select.style.width = "100%";
            select.style.minWidth = "100px";
            select.style.boxSizing = "border-box";
            select.style.padding = "4px";

            const blankOpt = document.createElement("option");
            blankOpt.value = "";
            blankOpt.text = "— none —";
            select.appendChild(blankOpt);

            ["yes", "no"].forEach((val) => {
              const opt = document.createElement("option");
              opt.value = val === "yes" ? "true" : "false";
              opt.text = val;
              if (
                currentValue.toLowerCase() === val ||
                (currentValue === "true" && val === "yes") ||
                (currentValue === "false" && val === "no")
              ) {
                opt.selected = true;
              }
              select.appendChild(opt);
            });

            cell.appendChild(select);
          } else if (optionValues && optionValues.length > 0) {
            // Render a <select> dropdown for option set fields
            const select = document.createElement("select");
            select.style.width = "100%";
            select.style.minWidth = "100px";
            select.style.boxSizing = "border-box";
            select.style.padding = "4px";

            // Add a blank option to allow clearing the value
            const blankOpt = document.createElement("option");
            blankOpt.value = "";
            blankOpt.text = "— none —";
            select.appendChild(blankOpt);

            optionValues.forEach((optVal) => {
              const opt = document.createElement("option");
              opt.value = optVal;
              opt.text = optVal;
              if (optVal === currentValue) opt.selected = true;
              select.appendChild(opt);
            });

            // If current value wasn't found in options, add it as a custom entry
            if (currentValue && !optionValues.includes(currentValue)) {
              const customOpt = document.createElement("option");
              customOpt.value = currentValue;
              customOpt.text = `${currentValue} (custom)`;
              customOpt.selected = true;
              select.appendChild(customOpt);
            }

            cell.appendChild(select);
          } else {
            // Default: render a text input for non-option-set fields
            const input = document.createElement("input");
            input.type = "text";
            input.value = currentValue;
            input.style.width = "100%";
            input.style.minWidth = "100px";
            input.style.boxSizing = "border-box";
            cell.appendChild(input);
          }
        });

        // Update action buttons to Save/Cancel
        const actionCell = row.querySelector(".action-cell");
        actionCell.innerHTML = `
                <div style="display: flex; gap: 5px; flex-direction: column;">
                    <button class="btn btn-primary" style="padding: 4px; font-size: 12px;" onclick="saveRow('${recordId}')">Save</button>
                    <button class="btn" style="padding: 4px; font-size: 12px;" onclick="cancelEditRow('${recordId}')">Cancel</button>
                </div>
            `;
      }

      function cancelEditRow(recordId) {
        const row = document.getElementById(`row-${recordId}`);
        const cells = row.querySelectorAll("td[data-field]");

        // Revert inputs back to plain text
        cells.forEach((cell) => {
          if (cell.hasAttribute("data-original")) {
            cell.innerText = cell.getAttribute("data-original");
            cell.removeAttribute("data-original");
          }
        });

        // Clear the primary Edit button
        const actionCell = row.querySelector(".action-cell");
        actionCell.innerHTML = ``;
      }

      async function saveRow(recordId) {
        // 1. Explicit Confirmation Step
        const isConfirmed = window.confirm(
          "Are you sure you want to save these changes to the database?",
        );
        if (!isConfirmed) return;

        const row = document.getElementById(`row-${recordId}`);
        const cells = row.querySelectorAll("td[data-field]");

        let payload = {};
        let hasChanges = false;

        // 2. Loop through row, compare original values to input/select values, and build payload
        cells.forEach((cell) => {
          if (cell.hasAttribute("data-original")) {
            const field = cell.getAttribute("data-field");
            const originalValue = cell.getAttribute("data-original");
            const input = cell.querySelector("input");
            const select = cell.querySelector("select");
            const editEl = input || select; // Whichever edit element exists

            if (editEl) {
              let val = editEl.value;

              const currentType =
                document.getElementById("data-type-selector").value;
              const isOptionSet = !!getOptionSetForField(currentType, field);
              const isBool = isBooleanField(currentType, field);

              let origCompared = originalValue;
              if (isBool) {
                if (
                  originalValue.toLowerCase() === "yes" ||
                  originalValue === "true"
                )
                  origCompared = "true";
                else if (
                  originalValue.toLowerCase() === "no" ||
                  originalValue === "false"
                )
                  origCompared = "false";
                else origCompared = "";
              }

              if (val !== origCompared && (val !== originalValue || isBool)) {
                // Handle boolean payload conversion
                if (isBool) {
                  if (val === "true" || val.toLowerCase() === "yes") val = true;
                  else if (val === "false" || val.toLowerCase() === "no")
                    val = false;
                  else if (val === "") val = null;
                } else if (!isOptionSet) {
                  // Determine the expected type by looking at cachedRecords
                  let expectedType = "unknown";
                  for (let record of cachedRecords) {
                    if (record[field] !== null && record[field] !== undefined) {
                      expectedType = typeof record[field];
                      break;
                    }
                  }

                  // Basic Data Type Casting to prevent 400 errors on Save
                  if (expectedType === "number") {
                    if (val.trim() !== "" && !isNaN(val)) {
                      val = Number(val);
                    } else if (val.trim() === "") {
                      val = null;
                    }
                  } else if (expectedType === "boolean") {
                    if (val.toLowerCase() === "true") val = true;
                    else if (val.toLowerCase() === "false") val = false;
                  } else if (expectedType === "string") {
                    // Leave as string to prevent "Expected a string, but got a number" errors
                  } else {
                    // Fallback to basic guessing if type is unknown (e.g. whole column is null)
                    if (val.trim() !== "" && !isNaN(val)) {
                      val = Number(val);
                    } else if (val.toLowerCase() === "true") {
                      val = true;
                    } else if (val.toLowerCase() === "false") {
                      val = false;
                    }
                  }
                }

                // For option set fields, send empty string as null to clear the value
                if (isOptionSet && val === "") {
                  val = null;
                }

                payload[field] = val;
                hasChanges = true;
              }
            }
          }
        });

        // If they clicked save but didn't change anything, just cancel the edit mode
        if (!hasChanges) {
          cancelEditRow(recordId);
          return;
        }

        const currentType = document.getElementById("data-type-selector").value;
        const fetchUrl = `${API_BASE_URL}${currentType}/${recordId}`;

        const actionCell = row.querySelector(".action-cell");
        const originalActions = actionCell.innerHTML; // Cache buttons in case of failure
        actionCell.innerHTML =
          '<span style="color: #007bff; font-size: 12px; font-weight: 500;">Saving...</span>';

        try {
          // 3. Send the PATCH request
          const response = await fetch(fetchUrl, {
            method: "PATCH",
            headers: {
              Authorization: `Bearer ${API_TOKEN}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const errData = await response.json();
            throw new Error(
              errData.body?.message || `HTTP Error: ${response.status}`,
            );
          }

          // 4. Success! Update the UI with new values
          cells.forEach((cell) => {
            if (cell.hasAttribute("data-original")) {
              const input = cell.querySelector("input");
              const select = cell.querySelector("select");
              const editEl = input || select;
              if (editEl) {
                const field = cell.getAttribute("data-field");
                const currentType =
                  document.getElementById("data-type-selector").value;
                const isBool = isBooleanField(currentType, field);

                let newValue = editEl.value;
                let displayValue = newValue;
                if (isBool) {
                  if (newValue === "true") {
                    newValue = true;
                    displayValue = "yes";
                  } else if (newValue === "false") {
                    newValue = false;
                    displayValue = "no";
                  } else {
                    newValue = null;
                    displayValue = "";
                  }
                }

                cell.innerText = displayValue;
                cell.removeAttribute("data-original");

                // Keep the local Javascript array in sync so client-side searching works
                const recordIndex = cachedRecords.findIndex(
                  (r) => r._id === recordId,
                );
                if (recordIndex > -1) {
                  cachedRecords[recordIndex][field] = newValue;
                }
              }
            }
          });

          // Clear Edit Button
          actionCell.innerHTML = ``;
        } catch (error) {
          console.error("Save error:", error);
          alert(`Failed to save to Bubble: ${error.message}`);
          // Revert to Save/Cancel buttons so they can try again
          actionCell.innerHTML = originalActions;
        }
      }

      // --- ROW SELECTION & DELETION ---
      function toggleRowSelection(recordId, isChecked) {
        if (isChecked) {
          selectedRowIds.add(recordId);
        } else {
          selectedRowIds.delete(recordId);
        }
        // Update row highlight without full re-render
        const row = document.getElementById(`row-${recordId}`);
        if (row) {
          row.classList.toggle("row-selected", isChecked);
        }
        updateSelectAllCheckbox();
        updateSelectionBar();
      }

      function toggleSelectAll(isChecked) {
        // Operate on currently visible (possibly filtered) records
        const filterValue = document
          .getElementById("table-filter")
          .value.trim()
          .toLowerCase();
        const visibleRecords = filterValue
          ? cachedRecords.filter((record) =>
              Object.values(record).some((val) => {
                if (val === null || val === undefined) return false;
                const s =
                  typeof val === "object" ? JSON.stringify(val) : String(val);
                return s.toLowerCase().includes(filterValue);
              }),
            )
          : cachedRecords;

        visibleRecords.forEach((record) => {
          if (isChecked) {
            selectedRowIds.add(record._id);
          } else {
            selectedRowIds.delete(record._id);
          }
          const row = document.getElementById(`row-${record._id}`);
          if (row) {
            row.classList.toggle("row-selected", isChecked);
            const cb = row.querySelector('.select-cell input[type="checkbox"]');
            if (cb) cb.checked = isChecked;
          }
        });
        updateSelectionBar();
      }

      function updateSelectAllCheckbox() {
        const selectAllCb = document.querySelector(
          'thead .select-cell input[type="checkbox"]',
        );
        if (!selectAllCb) return;
        const rows = document.querySelectorAll("tbody tr");
        if (rows.length === 0) {
          selectAllCb.checked = false;
          return;
        }
        const allChecked = Array.from(rows).every((row) => {
          const cb = row.querySelector('.select-cell input[type="checkbox"]');
          return cb && cb.checked;
        });
        selectAllCb.checked = allChecked;
      }

      function updateSelectionBar() {
        const bar = document.getElementById("selection-bar");
        const countSpan = document.getElementById("selection-count");
        const editBtn = document.getElementById("edit-selected-btn");
        const deleteBtn = document.getElementById("delete-selected-btn");
        const clearBtn = document.getElementById("clear-selection-btn");

        const count = selectedRowIds.size;
        if (count > 0) {
          bar.classList.add("active");
          countSpan.textContent = `${count} row${count !== 1 ? "s" : ""} selected`;
          if (editBtn) editBtn.disabled = false;
          if (deleteBtn) deleteBtn.disabled = false;
          if (clearBtn) clearBtn.disabled = false;
        } else {
          bar.classList.remove("active");
          countSpan.textContent = "0 rows selected";
          if (editBtn) editBtn.disabled = true;
          if (deleteBtn) deleteBtn.disabled = true;
          if (clearBtn) clearBtn.disabled = true;
        }
      }

      function clearSelection() {
        selectedRowIds.clear();
        // Uncheck all visible checkboxes and remove highlights
        document.querySelectorAll("tbody tr").forEach((row) => {
          row.classList.remove("row-selected");
          const cb = row.querySelector('.select-cell input[type="checkbox"]');
          if (cb) cb.checked = false;
        });
        updateSelectAllCheckbox();
        updateSelectionBar();
      }

      async function deleteSelectedRows() {
        const count = selectedRowIds.size;
        if (count === 0) return;

        const confirmed = window.confirm(
          `Are you sure you want to permanently delete ${count} row${count !== 1 ? "s" : ""}?\n\nThis action cannot be undone.`,
        );
        if (!confirmed) return;

        const currentType = document.getElementById("data-type-selector").value;
        const bar = document.getElementById("selection-bar");
        const countSpan = document.getElementById("selection-count");
        const idsToDelete = Array.from(selectedRowIds);

        let successCount = 0;
        let failCount = 0;

        for (let i = 0; i < idsToDelete.length; i++) {
          const id = idsToDelete[i];
          countSpan.textContent = `Deleting ${i + 1} of ${count}...`;

          try {
            const fetchUrl = `${API_BASE_URL}${currentType}/${id}`;
            const response = await fetch(fetchUrl, {
              method: "DELETE",
              headers: { Authorization: `Bearer ${API_TOKEN}` },
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            // Remove from local cache
            cachedRecords = cachedRecords.filter((r) => r._id !== id);
            selectedRowIds.delete(id);

            // Remove the row from the DOM immediately
            const row = document.getElementById(`row-${id}`);
            if (row) row.remove();

            successCount++;
          } catch (error) {
            console.error(`Failed to delete ${id}:`, error);
            failCount++;
          }
        }

        // Update UI
        updateSelectAllCheckbox();
        updateSelectionBar();

        // Report results
        let msg = `Deleted ${successCount} row${successCount !== 1 ? "s" : ""} successfully.`;
        if (failCount > 0) {
          msg += `\n${failCount} deletion${failCount !== 1 ? "s" : ""} failed. Check the console for details.`;
        }
        alert(msg);

        // If all visible rows were deleted, refresh to load more
        if (cachedRecords.length === 0) {
          fetchAndRenderData();
        }
      }

      // --- CREATE NEW ROW ---
      let isAddingNewRow = false;

      function addNewRow() {
        if (isAddingNewRow) return; // Prevent duplicate new rows
        if (detectedHeaders.length === 0) {
          alert("Load a table first before adding a row.");
          return;
        }
        isAddingNewRow = true;

        const tbody = document.querySelector("#table-container table tbody");
        if (!tbody) return;

        // Build a new row with empty inputs for each editable field
        const newRow = document.createElement("tr");
        newRow.id = "row-new";
        newRow.classList.add("new-row-adding");

        // Empty checkbox cell
        newRow.innerHTML = '<td class="select-cell"></td>';

        // Action cell with Save/Cancel
        newRow.innerHTML += `<td class="action-cell">
                <div style="display: flex; gap: 5px; flex-direction: column;">
                    <button class="btn btn-success" style="padding: 4px; font-size: 12px;" onclick="saveNewRow()">Create</button>
                    <button class="btn" style="padding: 4px; font-size: 12px;" onclick="cancelNewRow()">Cancel</button>
                </div>
            </td>`;

        // Data cells — editable inputs for user-writable fields, blank for system fields
        const currentType = document.getElementById("data-type-selector").value;
        detectedHeaders.forEach((header) => {
          const td = document.createElement("td");
          td.setAttribute("data-field", header);

          if (
            header === "_id" ||
            header === "Created Date" ||
            header === "Modified Date" ||
            header === "Created By"
          ) {
            td.innerHTML =
              '<span style="color: #999; font-style: italic; font-size: 12px;">auto</span>';
          } else {
            // Check if this field uses an option set or yes/no type
            const optionValues = getOptionSetForField(currentType, header);
            const isBool = isBooleanField(currentType, header);

            if (isBool) {
              const select = document.createElement("select");
              select.style.width = "100%";
              select.style.minWidth = "100px";
              select.style.boxSizing = "border-box";
              select.style.padding = "4px";

              const blankOpt = document.createElement("option");
              blankOpt.value = "";
              blankOpt.text = "— select —";
              select.appendChild(blankOpt);

              ["yes", "no"].forEach((val) => {
                const opt = document.createElement("option");
                opt.value = val === "yes" ? "true" : "false";
                opt.text = val;
                select.appendChild(opt);
              });

              td.appendChild(select);
            } else if (optionValues && optionValues.length > 0) {
              // Render a <select> dropdown for option set fields
              const select = document.createElement("select");
              select.style.width = "100%";
              select.style.minWidth = "100px";
              select.style.boxSizing = "border-box";
              select.style.padding = "4px";

              const blankOpt = document.createElement("option");
              blankOpt.value = "";
              blankOpt.text = "— select —";
              select.appendChild(blankOpt);

              optionValues.forEach((optVal) => {
                const opt = document.createElement("option");
                opt.value = optVal;
                opt.text = optVal;
                select.appendChild(opt);
              });

              td.appendChild(select);
            } else {
              const input = document.createElement("input");
              input.type = "text";
              input.value = "";
              input.placeholder = header.replace(/_/g, " ");
              input.style.width = "100%";
              input.style.minWidth = "100px";
              input.style.boxSizing = "border-box";
              td.appendChild(input);
            }
          }
          newRow.appendChild(td);
        });

        // Prepend the new row to the top of the table
        tbody.insertBefore(newRow, tbody.firstChild);

        // Scroll to the top so the user can see the new row
        document.getElementById("table-container").scrollTop = 0;

        // Focus the first editable input
        const firstInput = newRow.querySelector("td[data-field] input");
        if (firstInput) firstInput.focus();
      }

      function cancelNewRow() {
        const newRow = document.getElementById("row-new");
        if (newRow) newRow.remove();
        isAddingNewRow = false;
      }

      async function saveNewRow() {
        const newRow = document.getElementById("row-new");
        if (!newRow) return;

        const cells = newRow.querySelectorAll("td[data-field]");
        let payload = {};

        cells.forEach((cell) => {
          const field = cell.getAttribute("data-field");
          // Skip system-managed fields
          if (
            field === "_id" ||
            field === "Created Date" ||
            field === "Modified Date" ||
            field === "Created By"
          )
            return;

          const input = cell.querySelector("input");
          const select = cell.querySelector("select");
          const editEl = input || select;
          if (!editEl) return;

          let val = editEl.value;
          if (val.trim() === "") return; // Don't send empty fields

          // Check if this is an option set or yes/no field
          const currentType =
            document.getElementById("data-type-selector").value;
          const isOptionSet = !!getOptionSetForField(currentType, field);
          const isBool = isBooleanField(currentType, field);

          if (isBool) {
            if (val === "true" || val.toLowerCase() === "yes") val = true;
            else if (val === "false" || val.toLowerCase() === "no") val = false;
          } else if (!isOptionSet) {
            // Determine the expected type by looking at cachedRecords
            let expectedType = "unknown";
            for (let record of cachedRecords) {
              if (record[field] !== null && record[field] !== undefined) {
                expectedType = typeof record[field];
                break;
              }
            }

            // Basic data type casting
            if (expectedType === "number") {
              if (!isNaN(val)) val = Number(val);
            } else if (expectedType === "boolean") {
              if (val.toLowerCase() === "true") val = true;
              else if (val.toLowerCase() === "false") val = false;
            }
          }

          payload[field] = val;
        });

        const currentType = document.getElementById("data-type-selector").value;
        const fetchUrl = `${API_BASE_URL}${currentType}`;

        const actionCell = newRow.querySelector(".action-cell");
        const originalActions = actionCell.innerHTML;
        actionCell.innerHTML =
          '<span style="color: #28a745; font-size: 12px; font-weight: 500;">Creating...</span>';

        try {
          const response = await fetch(fetchUrl, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${API_TOKEN}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const errData = await response.json();
            throw new Error(
              errData.body?.message || `HTTP Error: ${response.status}`,
            );
          }

          // Success — refresh the table to show the new row with its server-assigned ID
          isAddingNewRow = false;
          await fetchAndRenderData();
        } catch (error) {
          console.error("Create row error:", error);
          alert(`Failed to create row: ${error.message}`);
          actionCell.innerHTML = originalActions;
        }
      }

      // Initialize the script
      initApp();

      // --- ENVIRONMENT SWITCHING ---
      async function handleVersionChange() {
        const selector = document.getElementById("version-selector");
        const typeSelector = document.getElementById("data-type-selector");
        const currentType = typeSelector ? typeSelector.value : null;

        // 1. Update the configuration variables based on the dropdown
        VERSION = selector.value;
        API_BASE_URL = `https://${DOMAIN_NAME}${VERSION}/api/1.1/obj/`;

        // 2. Update the visual color style of the dropdown badge
        if (VERSION === "") {
          selector.className = "badge-live";
        } else {
          selector.className = "badge-test";
        }

        // 3. Re-fetch data types for the new version (types may differ between test/live)
        const fetchedTypes = await fetchDataTypesFromBubble();
        rebuildDataTypes(fetchedTypes, currentType);
        console.log(
          `Re-loaded ${fetchedTypes.length} data types for ${VERSION || "live"} version.`,
        );

        // 4. Re-fetch option sets for the new version
        await fetchOptionSets();

        // 5. Reset state and fetch the data for the newly selected environment
        handleDataTypeChange();
      }

      // --- DRAG AND DROP COLUMN REORDERING ---
      let draggedColIdx = null;

      function toggleColumnEditMode() {
        isEditingColumns = !isEditingColumns;
        const editLink = document.getElementById("edit-columns-link");
        const editButtons = document.getElementById("column-edit-buttons");
        const saveBtn = document.getElementById("save-columns-btn");
        const cancelBtn = document.getElementById("cancel-columns-btn");
        const container = document.getElementById("table-container");

        if (isEditingColumns) {
          // Turn ON Edit Mode
          preEditHeadersBackup = [...detectedHeaders];
          if (editLink) editLink.style.display = "none";
          if (editButtons) editButtons.style.display = "flex";
          if (saveBtn) {
            saveBtn.innerText = "Save Column Order";
            saveBtn.disabled = false;
          }
          if (cancelBtn) cancelBtn.disabled = false;
        } else {
          // Turn OFF Edit Mode (Save)
          if (saveBtn) {
            saveBtn.innerText = "Saving...";
            saveBtn.disabled = true;
          }
          if (cancelBtn) cancelBtn.disabled = true;

          // Generate the new string-based orderMap
          const newMap = detectedHeaders;

          // Send to Bubble, then reset button/link visibility
          saveColumnOrderToBubble(newMap).then(() => {
            if (editButtons) editButtons.style.display = "none";
            if (saveBtn) {
              saveBtn.innerText = "Save Column Order";
              saveBtn.disabled = false;
            }
            if (cancelBtn) cancelBtn.disabled = false;
            if (editLink) editLink.style.display = "";
          });
        }

        // Re-render table to apply or remove draggable states
        renderTable(cachedRecords, detectedHeaders, container);
      }

      function cancelColumnEditMode() {
        isEditingColumns = false;
        detectedHeaders = [...preEditHeadersBackup];
        const editLink = document.getElementById("edit-columns-link");
        const editButtons = document.getElementById("column-edit-buttons");
        const container = document.getElementById("table-container");

        if (editButtons) editButtons.style.display = "none";
        if (editLink) editLink.style.display = "";

        renderTable(cachedRecords, detectedHeaders, container);
      }

      function handleDragStart(e, idx) {
        draggedColIdx = idx;
        e.dataTransfer.effectAllowed = "move";
        // Firefox requires data to be set to allow dragging
        e.dataTransfer.setData("text/plain", idx);
      }

      function handleDragOver(e) {
        // Prevent default to allow drop
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
      }

      function handleDrop(e, targetIdx) {
        e.preventDefault();
        if (draggedColIdx === null || draggedColIdx === targetIdx) return;

        // Reorder the headers array
        const draggedHeader = detectedHeaders[draggedColIdx];
        detectedHeaders.splice(draggedColIdx, 1);
        detectedHeaders.splice(targetIdx, 0, draggedHeader);

        // Re-render instantly to show new position
        const container = document.getElementById("table-container");
        renderTable(cachedRecords, detectedHeaders, container);

        draggedColIdx = null;
      }

      // --- SAVE COLUMN ORDER TO BUBBLE ---
      async function saveColumnOrderToBubble(newMap) {
        if (!settingsRecord || !settingsRecord._id) {
          alert(
            "Settings record not found in backend data constants. Cannot save layout.",
          );
          return;
        }

        const currentType = document.getElementById("data-type-selector").value;
        const currentTypeConfig = DATA_TYPES.find(
          (dt) => dt.value === currentType,
        );
        const targetKey = currentTypeConfig.layoutKey;

        // Hardcode the target to the backend data constants table and the specific settings record ID
        const fetchUrl = `${API_BASE_URL}${APP_SETTINGS_TYPE}/${settingsRecord._id}`;

        try {
          const response = await fetch(fetchUrl, {
            method: "PATCH",
            headers: {
              Authorization: `Bearer ${API_TOKEN}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ [targetKey]: newMap }),
          });

          if (!response.ok) {
            const errData = await response.json();
            throw new Error(
              errData.body?.message || `HTTP Error: ${response.status}`,
            );
          }

          // Update the local settings cache so it persists without a page refresh
          settingsRecord[targetKey] = newMap;
          console.log("Layout saved to backend data constants successfully.");
        } catch (error) {
          console.error("Save layout error:", error);
          alert(`Failed to save layout to Bubble: ${error.message}`);
        }
      }
    </script>
  </body>
