<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Admin Table</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        /* Table and Scroll Styles */
        #table-container {
            width: 100%;
            max-height: 65vh;
            /* Takes up 65% of the browser window height */
            overflow-y: auto;
            /* Enables vertical scrolling */
            overflow-x: auto;
            /* Enables horizontal scrolling */
            margin-top: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
            white-space: nowrap;
            /* Prevents text from wrapping and squishing columns */
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 10;
            /* Keeps the header above the scrolling data rows */
            background-color: #f4f6f8;
            /* Critical: prevents text from bleeding through */
            font-weight: 600;
            text-transform: capitalize;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
            /* Adds a crisp border-like shadow to the bottom of the sticky header */
            box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.2);
        }

        th:hover {
            background-color: #e2e6ea;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .error {
            color: red;
            font-weight: bold;
            padding: 10px;
        }

        /* Layout Styles */
        .toolbar {
            background: #f4f6f8;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .toolbar-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .search-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        /* Inline Table Filter */
        .table-filter-container {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-input {
            width: 300px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        /* Form Controls */
        input,
        select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        select#data-type-selector {
            font-weight: 600;
            font-size: 15px;
            padding: 8px 12px;
        }

        .btn {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: white;
            border-radius: 4px;
            font-weight: 500;
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn:hover:not(:disabled) {
            background: #e2e6ea;
        }

        .btn-primary {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }

        .btn-primary:hover:not(:disabled) {
            background: #0056b3;
        }

        #page-info {
            font-weight: 500;
            font-size: 14px;
        }

        /* Sort Icon Styling */
        .sort-icon {
            font-size: 10px;
            margin-left: 5px;
            color: #666;
        }

        .badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #edd4d4;
            color: #571515;
            font-weight: 500;
        }

        /* Version Indicator Dropdown Badge */
        select#version-selector {
            font-size: 20px;
            padding: 4px 10px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            vertical-align: middle;
            margin-left: 10px;
            cursor: pointer;
            outline: none;
        }

        select#version-selector.badge-live {
            background: #d0ffcf;
            color: #047d00;
        }

        select#version-selector.badge-test {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>

<body>

    <h1>Bubble Data Viewer
        <select id="version-selector" class="badge-test" onchange="handleVersionChange()">
            <option value="/version-test">Test Version</option>
            <option value="">Live</option>
        </select>
    </h1>

    <div class="toolbar">
        <div class="toolbar-header">
            <label style="font-size: 15px; font-weight: 600;">Active Table:</label>
            <select id="data-type-selector" onchange="handleDataTypeChange()">
            </select>

            <button id="edit-columns-btn" class="btn" onclick="toggleColumnEditMode()" style="margin-left: auto;">Edit
                Column Order</button>
        </div>

        <div class="search-group">
            <div class="search-bar">
                <label style="font-size: 14px; font-weight: 500;">Search Bubble:</label>
                <select id="search-field">
                    <option value="">-- Select Field --</option>
                </select>
                <input type="text" id="search-value" placeholder="Search (exact matches only)...">
                <button class="btn btn-primary" onclick="applyServerSearch()">Search DB</button>
                <button class="btn" onclick="clearServerSearch()">Clear Query</button>
            </div>
            <span class="badge">Bubble's search is limited to exact matches only.</span>
        </div>

        <div class="controls">
            <button id="prev-btn" class="btn" onclick="prevPage()" disabled>Previous</button>
            <span id="page-info">Loading...</span>
            <button id="next-btn" class="btn" onclick="nextPage()" disabled>Next</button>
        </div>
    </div>

    <div class="table-filter-container">
        <input type="text" id="table-filter" class="filter-input" oninput="applyClientFilter()"
            placeholder="Filter current view by keyword (all fields)...">
        <span style="font-size: 12px; color: #666;">Filters this page only. Other matches may exist on Bubble.</span>
    </div>

    <div id="table-container">
        <div style="padding: 10px;">Fetching data from Bubble...</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        let VERSION = '/version-test'; // Default to test database
        const DOMAIN_NAME = 'yourdomain.com'
        let API_BASE_URL = `https://${DOMAIN_NAME}${VERSION}/api/1.1/obj/`;
        const API_TOKEN = '<your private API key (Bubble Settings>API>Admin API Tokens)>';
        // column order constants
        let originalHeadersRaw = []; // Tracks original default index for the orderMap generator
        const APP_SETTINGS_TYPE = 'specialdataconstants'; // data type that stores custom column orders (lowercase, remove spaces)
        const LAYOUT_KEY_PREFIX = 'column order [live]';
        const LAYOUT_KEY_PREFIX_TEST = 'column order [test]';

        // Define your base table configurations
        const baseDataTypes = [
            {
                value: 'events', // Lowercase, no spaces. This must exactly match the value Bubble uses for the API
                label: 'Events', // lowercase version of this is used as the suffix if no other suffix is provided
                //suffix: 'custom suffix' // must match the suffix part of the name of the column order field
            },
            {
                value: 'specialdataconstants',
                label: 'Special Data Constants',
            },
            {
                value: 'giftcodes',
                label: 'Gift Codes',
            },
            {
                value: 'personalrecords',
                label: 'Personal Records',
            }
        ];
        // Automatically generate the full array with layout keys
        const DATA_TYPES = baseDataTypes.map(dt => {
            // Use the provided suffix, OR default to lowercasing the label
            const layoutSuffix = dt.suffix || dt.label.toLowerCase();

            return {
                value: dt.value,
                label: dt.label,
                // Dynamically build the layout keys
                layoutKeyLive: `${LAYOUT_KEY_PREFIX} ${layoutSuffix}`,
                layoutKeyTest: `${LAYOUT_KEY_PREFIX_TEST} ${layoutSuffix}`
            };
        });

        // --- GLOBAL STATE ---
        let currentCursor = 0;
        const LIMIT = 100;
        let currentConstraints = [];
        let fieldsPopulated = false;
        let cachedRecords = []; // Holds raw server results for local filtering
        let detectedHeaders = []; // Holds absolute unique columns
        let settingsRecord = null; // Holds your centralized database constants layout settings

        // --- COLUMN REORDERING STATE ---
        let isEditingColumns = false;

        // --- SORTING STATE ---
        let sortField = null;
        let sortDescending = false;

        // --- INITIALIZATION ---
        function initApp() {
            const selector = document.getElementById('data-type-selector');
            DATA_TYPES.forEach(dt => {
                const option = document.createElement('option');
                option.value = dt.value;
                option.text = dt.label;
                selector.appendChild(option);
            });

            // Explicitly set the default value to the first item in the array
            if (DATA_TYPES.length > 0) {
                selector.value = DATA_TYPES[0].value;
            }

            fetchAndRenderData();
        }

        // --- FETCH CENTRALIZED COLUMN ORDER SETTINGS ---
        async function fetchSettings() {
            try {
                // Fetch the single constants record
                const fetchUrl = `${API_BASE_URL}${APP_SETTINGS_TYPE}?limit=1`;
                const response = await fetch(fetchUrl, {
                    headers: { 'Authorization': `Bearer ${API_TOKEN}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.response.results && data.response.results.length > 0) {
                        settingsRecord = data.response.results[0];
                    }
                }
            } catch (err) {
                console.error("Failed to load special data constants:", err);
            }
        }

        // --- DATA TYPE SWITCHING ---
        function handleDataTypeChange() {
            // 0. Reset Column Edit Mode
            isEditingColumns = false;
            document.getElementById('edit-columns-btn').innerText = "Edit Column Order";
            document.getElementById('edit-columns-btn').className = 'btn';

            // 1. Reset Pagination & Sorting
            currentCursor = 0;
            sortField = null;
            sortDescending = false;

            // 2. Reset Search Constraints
            currentConstraints = [];
            document.getElementById('search-value').value = '';
            document.getElementById('table-filter').value = '';

            // 3. Reset the Query Dropdown
            const searchFieldSelect = document.getElementById('search-field');
            searchFieldSelect.innerHTML = '<option value="">-- Select Field --</option>';
            fieldsPopulated = false; // Forces the script to rescan the new data type's headers

            // 4. Fetch new table data
            fetchAndRenderData();
        }

        async function fetchAndRenderData() {
            const container = document.getElementById('table-container');
            const pageInfo = document.getElementById('page-info');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            container.innerHTML = '<div style="padding: 10px;">Fetching data...</div>';

            try {
                // Fetch layout settings FIRST
                await fetchSettings();

                // Set up headers for authentication
                const headersConfig = {};
                if (API_TOKEN) {
                    headersConfig['Authorization'] = `Bearer ${API_TOKEN}`;
                }

                // Construct URL dynamically based on the selected data type
                const currentType = document.getElementById('data-type-selector').value;
                let fetchUrl = `${API_BASE_URL}${currentType}?cursor=${currentCursor}`;

                // Append Constraints
                if (currentConstraints.length > 0) {
                    const constraintsJson = JSON.stringify(currentConstraints);
                    // encodeURIComponent ensures special characters like brackets and quotes don't break the URL
                    fetchUrl += `&constraints=${encodeURIComponent(constraintsJson)}`;
                }

                // Append sorting parameters
                if (sortField) {
                    fetchUrl += `&sort_field=${encodeURIComponent(sortField)}&descending=${sortDescending}`;
                }

                const response = await fetch(fetchUrl, { headers: headersConfig });

                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                cachedRecords = data.response.results || [];
                const remaining = data.response.remaining;
                const count = data.response.count;

                if (cachedRecords.length === 0) {
                    container.innerHTML = '<div style="padding: 10px;">No records found matching your database query.</div>';
                    pageInfo.innerText = 'No records';
                    nextBtn.disabled = true;
                    return;
                }

                // Determine all structural columns across the batch
                const allKeysSet = new Set();
                cachedRecords.forEach(record => {
                    Object.keys(record).forEach(key => allKeysSet.add(key));
                });
                detectedHeaders = Array.from(allKeysSet);

                // capture orginal column order
                originalHeadersRaw = [...detectedHeaders];
                // --- DATABASE-DRIVEN COLUMN REORDERING ---
                const currentTypeConfig = DATA_TYPES.find(dt => dt.value === currentType);
                const isLive = VERSION === '';

                // Grab the correct API field key from our config
                const targetKey = isLive ? currentTypeConfig.layoutKeyLive : currentTypeConfig.layoutKeyTest;

                let activeOrderMap = null;

                // Look for the array inside the special database constant settings record instead of cachedRecords
                if (settingsRecord && settingsRecord[targetKey]) {
                    const rawMap = settingsRecord[targetKey];
                    if (Array.isArray(rawMap)) {
                        activeOrderMap = rawMap;
                    } else if (typeof rawMap === 'string') {
                        try { activeOrderMap = JSON.parse(rawMap); } catch (e) { }
                    }
                }

                if (activeOrderMap && activeOrderMap.length > 0) {
                    let reorderedHeaders = [];

                    activeOrderMap.forEach(targetIndex => {
                        if (detectedHeaders[targetIndex]) {
                            reorderedHeaders.push(detectedHeaders[targetIndex]);
                        }
                    });

                    detectedHeaders.forEach(header => {
                        if (!reorderedHeaders.includes(header)) {
                            reorderedHeaders.push(header);
                        }
                    });

                    detectedHeaders = reorderedHeaders;
                }

                // Dynamically populate drop-down fields strictly once
                populateSearchFields(detectedHeaders);

                // Clear the local text input when turning pages/requerying, then render
                document.getElementById('table-filter').value = '';
                renderTable(cachedRecords, detectedHeaders, container);

                const startRecord = currentCursor + 1;
                const endRecord = currentCursor + count;
                pageInfo.innerText = `Showing ${startRecord} - ${endRecord} (${remaining} remaining)`;

                // Toggle button states
                prevBtn.disabled = currentCursor === 0;
                nextBtn.disabled = remaining === 0;

            } catch (error) {
                console.error("Fetch error:", error);
                container.innerHTML = `<div class="error">Failed to load data: ${error.message}</div>`;
                pageInfo.innerText = 'Error';
            }
        }

        function populateSearchFields(headers) {
            if (fieldsPopulated) return;
            const select = document.getElementById('search-field');

            headers.forEach(header => {
                const option = document.createElement('option');
                option.value = header;
                option.text = header.replace(/_/g, ' ').trim();
                option.style.textTransform = 'capitalize';
                select.appendChild(option);
            });
            fieldsPopulated = true;
        }

        function renderTable(records, headers, container) {
            // Extract column headers dynamically from the first record's keys
            let tableHTML = '<table><thead><tr>';

            // Add Actions Column Header
            tableHTML += '<th>Actions</th>';

            // Generate Data Headers (Conditionally Draggable)
            headers.forEach((header, index) => {
                const cleanHeader = header.replace(/_/g, ' ').trim();
                let sortIcon = '';
                if (sortField === header) {
                    sortIcon = sortDescending ? '<span class="sort-icon">▼</span>' : '<span class="sort-icon">▲</span>';
                }

                // Determine behaviors based on mode
                const draggableAttr = isEditingColumns ? 'draggable="true"' : '';
                const cursorStyle = isEditingColumns ? 'cursor: grab;' : 'cursor: pointer;';
                const dragEvents = isEditingColumns ? `ondragstart="handleDragStart(event, ${index})" ondragover="handleDragOver(event)" ondrop="handleDrop(event, ${index})"` : '';
                const clickEvent = isEditingColumns ? '' : `onclick="handleSort('${header}')"`; // Disable sorting while dragging
                const titleText = isEditingColumns ? 'Drag to reorder column' : `Sort by ${cleanHeader}`;

                tableHTML += `<th 
                                ${draggableAttr}
                                ${dragEvents}
                                ${clickEvent}
                                style="${cursorStyle}"
                                title="${titleText}">
                                ${cleanHeader} ${sortIcon}
                              </th>`;
            });

            tableHTML += '</tr></thead><tbody>';

            // Generate Data Rows
            records.forEach(record => {
                // Attach the _id to the tr element so we can target the whole row
                tableHTML += `<tr id="row-${record._id}">`;

                // Add the explicit Edit Button cell
                tableHTML += `<td class="action-cell">
                                <button class="btn" style="padding: 4px 8px; font-size: 12px;" onclick="editRow('${record._id}')">Edit</button>
                              </td>`;

                headers.forEach(header => {
                    let cellValue = record[header];

                    // Handle missing values cleanly
                    if (cellValue === null || cellValue === undefined) {
                        cellValue = '';
                    }
                    // Bubble often returns linked data or geographic addresses as objects/arrays
                    else if (typeof cellValue === 'object') {
                        cellValue = JSON.stringify(cellValue);
                    }

                    // Assign data-field so we can map inputs back to Bubble's database schema
                    tableHTML += `<td data-field="${header}">${cellValue}</td>`;
                });
                tableHTML += '</tr>';
            });

            tableHTML += '</tbody></table>';

            // Inject the completed table into the DOM
            container.innerHTML = tableHTML;
        }

        // --- CLIENT SIDE INLINE TABLE FILTER ---
        function applyClientFilter() {
            const filterValue = document.getElementById('table-filter').value.trim().toLowerCase();
            const container = document.getElementById('table-container');

            if (!filterValue) {
                // If text input is blank, return to unfiltered cached server rows
                renderTable(cachedRecords, detectedHeaders, container);
                return;
            }

            const filteredRecords = cachedRecords.filter(record => {
                return Object.values(record).some(val => {
                    if (val === null || val === undefined) return false;
                    const stringVal = typeof val === 'object' ? JSON.stringify(val) : String(val);
                    return stringVal.toLowerCase().includes(filterValue);
                });
            });

            if (filteredRecords.length === 0) {
                container.innerHTML = `<div style="padding: 10px;">No visible records match "${filterValue}" on this page.</div>`;
            } else {
                renderTable(filteredRecords, detectedHeaders, container);
            }
        }

        // --- SERVER SIDE SEARCH ACTIONS ---
        function applyServerSearch() {
            const field = document.getElementById('search-field').value;
            const value = document.getElementById('search-value').value;

            if (!field) {
                alert("Please pick a target database field to execute a query.");
                return;
            }
            if (!value.trim()) {
                clearServerSearch();
                return;
            }

            // Construct the Bubble API constraint object
            currentConstraints = [{
                key: field,
                constraint_type: 'text contains',
                value: value.trim()
            }];

            // Reset to the first page of results
            currentCursor = 0;
            fetchAndRenderData();
        }

        function clearServerSearch() {
            document.getElementById('search-value').value = '';
            document.getElementById('search-field').value = '';
            currentConstraints = [];
            currentCursor = 0;
            fetchAndRenderData();
        }

        // --- SERVER SIDE SORTING ---
        function handleSort(field) {
            if (sortField === field) {
                sortDescending = !sortDescending;
            } else {
                sortField = field;
                sortDescending = false;
            }
            currentCursor = 0;
            fetchAndRenderData();
        }

        // --- PAGINATION ACTIONS ---
        function nextPage() {
            currentCursor += LIMIT;
            fetchAndRenderData();
        }

        function prevPage() {
            currentCursor = Math.max(0, currentCursor - LIMIT);
            fetchAndRenderData();
        }

        // --- CLIENT SIDE ROW EDITING ---
        function editRow(recordId) {
            const row = document.getElementById(`row-${recordId}`);
            const cells = row.querySelectorAll('td[data-field]'); // Grab all data cells

            cells.forEach(cell => {
                const field = cell.getAttribute('data-field');

                // Prevent editing of Bubble's protected system IDs
                if (field === '_id' || field === 'Created Date' || field === 'Modified Date') return;

                const currentValue = cell.innerText;
                cell.setAttribute('data-original', currentValue); // Store for cancellation

                // Swap text for an input field
                const input = document.createElement('input');
                input.type = 'text';
                input.value = currentValue;
                input.style.width = '100%';
                input.style.minWidth = '100px';
                input.style.boxSizing = 'border-box';

                cell.innerHTML = '';
                cell.appendChild(input);
            });

            // Update action buttons to Save/Cancel
            const actionCell = row.querySelector('.action-cell');
            actionCell.innerHTML = `
                <div style="display: flex; gap: 5px; flex-direction: column;">
                    <button class="btn btn-primary" style="padding: 4px; font-size: 12px;" onclick="saveRow('${recordId}')">Save</button>
                    <button class="btn" style="padding: 4px; font-size: 12px;" onclick="cancelEditRow('${recordId}')">Cancel</button>
                </div>
            `;
        }

        function cancelEditRow(recordId) {
            const row = document.getElementById(`row-${recordId}`);
            const cells = row.querySelectorAll('td[data-field]');

            // Revert inputs back to plain text
            cells.forEach(cell => {
                if (cell.hasAttribute('data-original')) {
                    cell.innerText = cell.getAttribute('data-original');
                    cell.removeAttribute('data-original');
                }
            });

            // Restore the primary Edit button
            const actionCell = row.querySelector('.action-cell');
            actionCell.innerHTML = `<button class="btn" style="padding: 4px 8px; font-size: 12px;" onclick="editRow('${recordId}')">Edit</button>`;
        }

        async function saveRow(recordId) {
            // 1. Explicit Confirmation Step
            const isConfirmed = window.confirm("Are you sure you want to save these changes to the database?");
            if (!isConfirmed) return;

            const row = document.getElementById(`row-${recordId}`);
            const cells = row.querySelectorAll('td[data-field]');

            let payload = {};
            let hasChanges = false;

            // 2. Loop through row, compare original values to input values, and build payload
            cells.forEach(cell => {
                if (cell.hasAttribute('data-original')) {
                    const field = cell.getAttribute('data-field');
                    const originalValue = cell.getAttribute('data-original');
                    const input = cell.querySelector('input');

                    if (input && input.value !== originalValue) {
                        payload[field] = input.value;
                        hasChanges = true;
                    }
                }
            });

            // If they clicked save but didn't change anything, just cancel the edit mode
            if (!hasChanges) {
                cancelEditRow(recordId);
                return;
            }

            const currentType = document.getElementById('data-type-selector').value;
            const fetchUrl = `${API_BASE_URL}${currentType}/${recordId}`;

            const actionCell = row.querySelector('.action-cell');
            const originalActions = actionCell.innerHTML; // Cache buttons in case of failure
            actionCell.innerHTML = '<span style="color: #007bff; font-size: 12px; font-weight: 500;">Saving...</span>';

            try {
                // 3. Send the PATCH request
                const response = await fetch(fetchUrl, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.body?.message || `HTTP Error: ${response.status}`);
                }

                // 4. Success! Update the UI with new values
                cells.forEach(cell => {
                    if (cell.hasAttribute('data-original')) {
                        const input = cell.querySelector('input');
                        if (input) {
                            const newValue = input.value;
                            cell.innerText = newValue;
                            cell.removeAttribute('data-original');

                            // Keep the local Javascript array in sync so client-side searching works
                            const field = cell.getAttribute('data-field');
                            const recordIndex = cachedRecords.findIndex(r => r._id === recordId);
                            if (recordIndex > -1) {
                                cachedRecords[recordIndex][field] = newValue;
                            }
                        }
                    }
                });

                // Restore Edit Button
                actionCell.innerHTML = `<button class="btn" style="padding: 4px 8px; font-size: 12px;" onclick="editRow('${recordId}')">Edit</button>`;

            } catch (error) {
                console.error("Save error:", error);
                alert(`Failed to save to Bubble: ${error.message}`);
                // Revert to Save/Cancel buttons so they can try again
                actionCell.innerHTML = originalActions;
            }
        }

        // Initialize the script
        initApp();

        // --- ENVIRONMENT SWITCHING ---
        function handleVersionChange() {
            const selector = document.getElementById('version-selector');

            // 1. Update the configuration variables based on the dropdown
            VERSION = selector.value;
            API_BASE_URL = `https://${DOMAIN_NAME}${VERSION}/api/1.1/obj/`;

            // 2. Update the visual color style of the dropdown badge
            if (VERSION === '') {
                selector.className = 'badge-live';
            } else {
                selector.className = 'badge-test';
            }

            // 3. Reset state and fetch the data for the newly selected environment
            handleDataTypeChange();
        }

        // --- DRAG AND DROP COLUMN REORDERING ---
        let draggedColIdx = null;

        function toggleColumnEditMode() {
            isEditingColumns = !isEditingColumns;
            const btn = document.getElementById('edit-columns-btn');
            const container = document.getElementById('table-container');

            if (isEditingColumns) {
                // Turn ON Edit Mode
                btn.innerText = "Save Column Order";
                btn.className = 'btn btn-primary';
            } else {
                // Turn OFF Edit Mode (Save)
                btn.innerText = "Saving...";
                btn.className = 'btn';
                btn.disabled = true; // Prevent clicking while saving

                // Generate the new orderMap
                const newMap = detectedHeaders.map(header => originalHeadersRaw.indexOf(header));

                // Send to Bubble, then reset button text
                saveColumnOrderToBubble(newMap).then(() => {
                    btn.innerText = "Edit Column Order";
                    btn.disabled = false;
                });
            }

            // Re-render table to apply or remove draggable states
            renderTable(cachedRecords, detectedHeaders, container);
        }

        function handleDragStart(e, idx) {
            draggedColIdx = idx;
            e.dataTransfer.effectAllowed = "move";
            // Firefox requires data to be set to allow dragging
            e.dataTransfer.setData('text/plain', idx);
        }

        function handleDragOver(e) {
            // Prevent default to allow drop
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
        }

        function handleDrop(e, targetIdx) {
            e.preventDefault();
            if (draggedColIdx === null || draggedColIdx === targetIdx) return;

            // Reorder the headers array
            const draggedHeader = detectedHeaders[draggedColIdx];
            detectedHeaders.splice(draggedColIdx, 1);
            detectedHeaders.splice(targetIdx, 0, draggedHeader);

            // Re-render instantly to show new position
            const container = document.getElementById('table-container');
            renderTable(cachedRecords, detectedHeaders, container);

            draggedColIdx = null;
        }

        // --- SAVE COLUMN ORDER TO BUBBLE ---
        async function saveColumnOrderToBubble(newMap) {
            if (!settingsRecord || !settingsRecord._id) {
                alert("Settings record not found in Special Data Constants. Cannot save layout.");
                return;
            }

            const currentType = document.getElementById('data-type-selector').value;
            const currentTypeConfig = DATA_TYPES.find(dt => dt.value === currentType);
            const isLive = VERSION === '';

            const targetKey = isLive ? currentTypeConfig.layoutKeyLive : currentTypeConfig.layoutKeyTest;

            // Hardcode the target to the special data constants table and the specific settings record ID
            const fetchUrl = `${API_BASE_URL}${APP_SETTINGS_TYPE}/${settingsRecord._id}`;

            try {
                const response = await fetch(fetchUrl, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ [targetKey]: newMap })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.body?.message || `HTTP Error: ${response.status}`);
                }

                // Update the local settings cache so it persists without a page refresh
                settingsRecord[targetKey] = newMap;
                console.log("Layout saved to Special Data Constants successfully.");

            } catch (error) {
                console.error("Save layout error:", error);
                alert(`Failed to save layout to Bubble: ${error.message}`);
            }
        }

    </script>
</body>

</html>
